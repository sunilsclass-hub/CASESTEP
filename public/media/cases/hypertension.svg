<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="htn-title">
  <title id="htn-title">Illustration representing Hypertension — blood pressure measurement</title>
  <circle cx="200" cy="150" r="110" fill="#eef2ff"/>
  <circle cx="200" cy="150" r="78" fill="#e0e7ff" opacity="0.7"/>
  <!-- BP gauge -->
  <circle cx="200" cy="140" r="52" fill="#ffffff" stroke="#4338ca" stroke-width="4"/>
  <circle cx="200" cy="140" r="4" fill="#4338ca"/>
  <line x1="200" y1="140" x2="224" y2="118" stroke="#4338ca" stroke-width="4" stroke-linecap="round"/>
  <path d="M156 128 A48 48 0 0 1 244 128" fill="none" stroke="#a5b4fc" stroke-width="6" stroke-linecap="round"/>
  <!-- cuff -->
  <rect x="130" y="205" width="140" height="34" rx="17" fill="#4f46e5"/>
  <rect x="160" y="205" width="24" height="34" fill="#3730a3"/>
  <!-- pulse line -->
  <polyline points="90,255 130,255 145,230 160,270 175,240 190,255 310,255" fill="none" stroke="#0d9488" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
