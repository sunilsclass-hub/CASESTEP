<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="footrisk-title">
  <title id="footrisk-title">Illustration representing diabetic foot-risk screening — monofilament testing</title>
  <circle cx="200" cy="150" r="110" fill="#f0fdfa"/>
  <circle cx="200" cy="150" r="78" fill="#ccfbf1" opacity="0.8"/>
  <!-- abstract foot outline -->
  <path d="M150 210c-6-30 4-58 20-70 10-8 8-24 20-30 10-5 20 2 22 14 2 12-4 20-2 32 2 14 14 18 18 32 6 20-6 34-30 36-22 2-42-2-48-14z" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
  <!-- test points -->
  <circle cx="168" cy="196" r="5" fill="#f59e0b"/>
  <circle cx="188" cy="206" r="5" fill="#f59e0b"/>
  <circle cx="182" cy="170" r="5" fill="#f59e0b"/>
  <!-- monofilament line -->
  <line x1="250" y1="140" x2="300" y2="120" stroke="#4338ca" stroke-width="3" stroke-linecap="round"/>
  <circle cx="303" cy="118" r="6" fill="#4338ca"/>
</svg>
